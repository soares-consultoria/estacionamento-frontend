name: Deploy no ambiente de desenvolvimento

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build do projeto
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Deploy para S3
        run: |
          aws s3 sync dist/ s3://estacionamento-prod-frontend/ \
            --delete \
            --cache-control "no-cache" \
            --exclude "assets/*"
          aws s3 sync dist/assets/ s3://estacionamento-prod-frontend/assets/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable"

      - name: Invalidar cache do CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E27IA6ZQXLDK7D \
            --paths "/*"
