name: Deploy no ambiente de desenvolvimento

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Build do projeto
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Remover arquivos antigos no EC2
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ec2-16-58-227-174.us-east-2.compute.amazonaws.com
          username: ec2-user
          key: ${{ secrets.ESTACIONAMENTO_KEY }}
          port: 22
          script: |
            sudo rm -rf /usr/share/nginx/html/*

      - name: Copiar dist para EC2
        uses: appleboy/scp-action@master
        with:
          host: ec2-16-58-227-174.us-east-2.compute.amazonaws.com
          username: ec2-user
          key: ${{ secrets.ESTACIONAMENTO_KEY }}
          port: 22
          source: "./dist/*"
          target: "/home/ec2-user/frontend-dist"
          strip_components: 1

      - name: Mover arquivos e recarregar Nginx
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ec2-16-58-227-174.us-east-2.compute.amazonaws.com
          username: ec2-user
          key: ${{ secrets.ESTACIONAMENTO_KEY }}
          port: 22
          script: |
            sudo cp -r /home/ec2-user/frontend-dist/* /usr/share/nginx/html/
            sudo rm -rf /home/ec2-user/frontend-dist
            sudo nginx -t && sudo systemctl reload nginx
