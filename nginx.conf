# Configuração Nginx para o dashboard estacionamento-frontend
# Copiar este arquivo para /etc/nginx/conf.d/estacionamento-frontend.conf no EC2
#
# Instalação inicial no EC2 (executar uma única vez):
#   sudo yum install nginx -y          # Amazon Linux 2
#   sudo systemctl enable nginx
#   sudo systemctl start nginx
#   sudo cp nginx.conf /etc/nginx/conf.d/estacionamento-frontend.conf
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para melhor performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # Cache para assets com hash (gerados pelo Vite)
    location ~* /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Fallback para React Router — todas as rotas servem index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para a API (evita CORS em produção)
    location /estacionamento-api/ {
        proxy_pass http://localhost:8181/estacionamento-api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }
}
